version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9090:8080"
    environment:
      - ENV=development
      - PORT=8080
      - JWT_SECRET=snapvid_dev_secret_2026_secure_key_min32bytes
    volumes:
      - downloads:/app/downloads
    restart: unless-stopped

volumes:
  downloads:
